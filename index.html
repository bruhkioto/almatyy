<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Almaty — Explore the City</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --red:    #E8382F;
      --orange: #F97316;
      --yellow: #FCD34D;
      --teal:   #0D9488;
      --sky:    #38BDF8;
      --ink:    #0F1117;
      --cream:  #FFF8EE;
      --muted:  #6B7280;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--ink);
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    header {
      position: relative;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      padding: .75rem 1.5rem;
      background: var(--ink);
      border-bottom: 2px solid var(--red);
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: .05em;
      color: var(--cream);
      line-height: 1;
    }
    .logo span { color: var(--red); }
    .tagline {
      font-size: .75rem;
      font-weight: 300;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .dot-legend {
      margin-left: auto;
      display: flex;
      gap: .9rem;
      align-items: center;
    }
    .dot-legend span {
      display: flex;
      align-items: center;
      gap: .35rem;
      font-size: .7rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .dot-legend i {
      width: 10px; height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    /* MAP */
    #map {
      flex: 1;
      width: 100%;
      background: #1a1f2e;
    }

    .leaflet-tile-pane { filter: saturate(.35) brightness(.55) hue-rotate(200deg); }
    .leaflet-control-attribution { display: none; }
    .leaflet-control-zoom a {
      background: var(--ink) !important;
      color: var(--cream) !important;
      border-color: #333 !important;
    }

    /* MARKER */
    .pin-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: transform .2s;
      will-change: transform;
    }
    .pin-wrap:hover { transform: scale(1.15) translateY(-3px); }
    .pin-bubble {
      width: 40px; height: 40px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      box-shadow: 0 4px 18px rgba(0,0,0,.6);
      border: 2px solid rgba(255,255,255,.18);
    }
    .pin-bubble .icon { transform: rotate(45deg); line-height: 1; }
    .pin-label {
      margin-top: 4px;
      background: var(--ink);
      color: var(--cream);
      font-size: .6rem;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 20px;
      white-space: nowrap;
      border: 1px solid rgba(255,255,255,.12);
    }

    /* PANEL */
    #panel {
      position: fixed;
      top: 0; right: 0;
      width: min(420px, 100vw);
      height: 100dvh;
      background: var(--ink);
      border-left: 2px solid var(--red);
      z-index: 9999;
      transform: translateX(110%);
      transition: transform .4s cubic-bezier(.22,1,.36,1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #panel.open { transform: translateX(0); }

    .panel-close {
      position: absolute;
      top: 1rem; right: 1rem;
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.15);
      color: var(--cream);
      font-size: 1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
      z-index: 10;
    }
    .panel-close:hover { background: var(--red); }

    .panel-gallery {
      width: 100%;
      height: 260px;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .panel-gallery img {
      width: 100%; height: 100%;
      object-fit: cover;
      position: absolute;
      top: 0; left: 0;
      opacity: 0;
      transition: opacity .5s;
    }
    .panel-gallery img.active { opacity: 1; }
    .gallery-dots {
      position: absolute;
      bottom: 10px;
      left: 50%; transform: translateX(-50%);
      display: flex; gap: 6px;
    }
    .gallery-dots button {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,.35);
      border: none; cursor: pointer;
      padding: 0;
      transition: background .2s, transform .2s;
    }
    .gallery-dots button.active {
      background: var(--yellow);
      transform: scale(1.3);
    }

    .panel-accent {
      height: 4px;
      width: 100%;
      background: linear-gradient(90deg, var(--red), var(--orange), var(--yellow));
      flex-shrink: 0;
    }

    .panel-body {
      padding: 1.5rem;
      overflow-y: auto;
      flex: 1;
    }
    .panel-category {
      font-size: .65rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--orange);
      font-weight: 500;
      margin-bottom: .4rem;
    }
    .panel-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      line-height: 1;
      letter-spacing: .04em;
      color: var(--cream);
      margin-bottom: .8rem;
    }
    .panel-desc {
      font-size: .9rem;
      line-height: 1.7;
      color: #b0b8c8;
      margin-bottom: 1.2rem;
    }
    .panel-facts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .6rem;
      margin-bottom: 1.4rem;
    }
    .fact-card {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 8px;
      padding: .65rem .85rem;
    }
    .fact-card .label {
      font-size: .6rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2px;
    }
    .fact-card .value {
      font-size: .88rem;
      font-weight: 500;
      color: var(--cream);
    }
    .panel-tip {
      background: linear-gradient(135deg, rgba(232,56,47,.12), rgba(249,115,22,.08));
      border-left: 3px solid var(--red);
      border-radius: 0 8px 8px 0;
      padding: .75rem 1rem;
      font-size: .82rem;
      color: #c8d0dc;
      line-height: 1.6;
    }
    .panel-tip strong { color: var(--yellow); }

    /* TICKER */
    #ticker {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 34px;
      background: var(--red);
      display: flex;
      align-items: center;
      overflow: hidden;
      z-index: 900;
    }
    .ticker-inner {
      display: flex;
      white-space: nowrap;
      animation: ticker 30s linear infinite;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: .12em;
      color: rgba(255,255,255,.9);
      gap: 3rem;
    }
    @keyframes ticker {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    .panel-body::-webkit-scrollbar { width: 4px; }
    .panel-body::-webkit-scrollbar-track { background: transparent; }
    .panel-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 2px; }

    @media (max-width: 600px) {
      #panel { width: 100vw; }
      .dot-legend { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">ALMA<span>TY</span></div>
    <div class="tagline">City of Apple Trees · Explorer's Map</div>
  </div>
  <div class="dot-legend">
    <span><i style="background:#E8382F"></i> Nature</span>
    <span><i style="background:#F97316"></i> Culture</span>
    <span><i style="background:#38BDF8"></i> Market</span>
    <span><i style="background:#0D9488"></i> Park</span>
    <span><i style="background:#FCD34D"></i> View</span>
  </div>
</header>

<div id="map"></div>

<div id="panel">
  <button class="panel-close" onclick="closePanel()">✕</button>
  <div class="panel-gallery" id="panelGallery"></div>
  <div class="panel-accent"></div>
  <div class="panel-body">
    <div class="panel-category" id="panelCategory"></div>
    <div class="panel-title" id="panelTitle"></div>
    <div class="panel-desc" id="panelDesc"></div>
    <div class="panel-facts" id="panelFacts"></div>
    <div class="panel-tip" id="panelTip"></div>
  </div>
</div>

<div id="ticker">
  <div class="ticker-inner" id="tickerInner"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const PLACES = [
  {
    name: 'Almaty Lake',
    category: 'Nature',
    color: '#E8382F',
    icon: '🏔️',
    lat: 43.1558, lng: 77.0283,
    desc: 'A breathtaking alpine lake nestled at 2,510 m above sea level in the Tian Shan mountains. Crystal-clear turquoise waters are fed by glacial streams, surrounded by fir forests and dramatic peaks — one of Almaty\'s most iconic escapes.',
    facts: [
      { label: 'Altitude', value: '2,510 m' },
      { label: 'Best Season', value: 'June – Sep' },
      { label: 'Distance', value: '28 km from center' },
      { label: 'Temp (summer)', value: '~10–18 °C' },
    ],
    tip: '<strong>Pro tip:</strong> Take the morning bus from Sairan station to avoid weekend crowds. Bring a warm layer — mountain weather changes fast.',
    images: [
      'https://upload.wikimedia.org/wikipedia/commons/thumb/e/ed/Big_Almaty_lake.jpg/1280px-Big_Almaty_lake.jpg',
      'https://upload.wikimedia.org/wikipedia/commons/thumb/3/39/Big_Almaty_Lake_%281%29.jpg/1280px-Big_Almaty_Lake_%281%29.jpg',
    ],
  },
  {
    name: 'Medeu',
    category: 'Nature',
    color: '#E8382F',
    icon: '⛸️',
    lat: 43.1436, lng: 77.0621,
    desc: 'The world\'s highest high-altitude skating rink at 1,691 m. Medeu has hosted countless speed-skating world records. In summer it transforms into a vibrant outdoor venue with mountain views that stretch forever.',
    facts: [
      { label: 'Altitude', value: '1,691 m' },
      { label: 'Rink Area', value: '10,500 m²' },
      { label: 'Open', value: 'Year-round' },
      { label: 'Distance', value: '15 km from center' },
    ],
    tip: '<strong>Pro tip:</strong> Climb the 842 steps of the dam for panoramic views of the Malaya Almatinka gorge — totally free and unforgettable.',
    images: [
      'https://upload.wikimedia.org/wikipedia/commons/thumb/9/97/MedeoRink.jpg/1280px-MedeoRink.jpg',
      'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b2/Medeu_skating_rink_2009.jpg/1280px-Medeu_skating_rink_2009.jpg',
    ],
  },
  {
    name: 'Kok-Tobe Hill',
    category: 'View',
    color: '#FCD34D',
    icon: '🗼',
    lat: 43.2458, lng: 76.9853,
    desc: 'Almaty\'s beloved hilltop park at 1,100 m. Reached by a scenic cable car, Kok-Tobe offers sweeping views of the city skyline backed by snowcapped Tian Shan peaks. There\'s also a famous statue of The Beatles here.',
    facts: [
      { label: 'Altitude', value: '1,100 m' },
      { label: 'Cable Car', value: 'Yes — 4 min ride' },
      { label: 'Open', value: 'Daily, 10:00–23:00' },
      { label: 'Highlight', value: 'Beatles Statue' },
    ],
    tip: '<strong>Pro tip:</strong> Go at dusk — the city lights up below while mountains glow pink in alpenglow. Cable car last trip ~22:30.',
    images: [
      'https://upload.wikimedia.org/wikipedia/commons/thumb/7/74/Kok_Tobe_Hill%2C_Almaty%2C_Kazakhstan.jpg/1280px-Kok_Tobe_Hill%2C_Almaty%2C_Kazakhstan.jpg',
      'https://upload.wikimedia.org/wikipedia/commons/thumb/5/52/Almaty_from_Kok-Tobe.jpg/1280px-Almaty_from_Kok-Tobe.jpg',
    ],
  },
  {
    name: 'Green Bazaar',
    category: 'Market',
    color: '#38BDF8',
    icon: '🧆',
    lat: 43.2615, lng: 76.9508,
    desc: 'Almaty\'s legendary covered market bursting with colour, scent and life. Vendors pile high with dried fruits, spices, kumiss, kurt, baursaki and every Central Asian delight imaginable — the authentic heartbeat of the city.',
    facts: [
      { label: 'Hours', value: '8:00 – 20:00' },
      { label: 'Founded', value: '1875' },
      { label: 'Location', value: 'Zhibek Zholy Ave' },
      { label: 'Must-try', value: 'Dried apricots & kurt' },
    ],
    tip: '<strong>Pro tip:</strong> Bargain with a smile — haggling is expected. Try the freshly made samsa from vendors near the east entrance.',
    images: [
      'https://upload.wikimedia.org/wikipedia/commons/thumb/f/f0/Green_Bazaar_Almaty.jpg/1280px-Green_Bazaar_Almaty.jpg',
      'https://upload.wikimedia.org/wikipedia/commons/thumb/9/90/Zelyony_bazar.jpg/1280px-Zelyony_bazar.jpg',
    ],
  },
  {
    name: 'Presidential Park',
    category: 'Park',
    color: '#0D9488',
    icon: '🌳',
    lat: 43.2415, lng: 76.9492,
    desc: 'A grand urban park with tree-lined allées, fountains, rose gardens, and the golden Monument of Independence. Almaty\'s green lung and favourite weekend stroll, lively with families, picnics and street performers.',
    facts: [
      { label: 'Area', value: '~70 hectares' },
      { label: 'Entry', value: 'Free, 24 hrs' },
      { label: 'Feature', value: 'Independence Monument' },
      { label: 'Metro', value: 'Baikonur Station' },
    ],
    tip: '<strong>Pro tip:</strong> Walk south toward Alatau Avenue for street food stalls selling lagman and corn. Lovely on spring mornings.',
    images: [
      'https://upload.wikimedia.org/wikipedia/commons/thumb/f/f6/Kazakhstan_Independence_Monument.jpg/1280px-Kazakhstan_Independence_Monument.jpg',
      'https://upload.wikimedia.org/wikipedia/commons/thumb/8/8e/Almaty_First_President_Park.jpg/1280px-Almaty_First_President_Park.jpg',
    ],
  },
  {
    name: 'Shymbulak Resort',
    category: 'Nature',
    color: '#E8382F',
    icon: '⛷️',
    lat: 43.1304, lng: 77.0799,
    desc: 'Central Asia\'s premier ski resort at 2,200–3,200 m. In winter it\'s powder slopes and high-speed gondolas; in summer, hikers and mountain bikers take over. A gondola ride from Medeu lifts you above the clouds.',
    facts: [
      { label: 'Base Altitude', value: '2,200 m' },
      { label: 'Top Altitude', value: '3,200 m' },
      { label: 'Ski Season', value: 'Nov – April' },
      { label: 'Gondola', value: 'From Medeu' },
    ],
    tip: '<strong>Pro tip:</strong> Buy a combo Medeu + Shymbulak gondola ticket for best value. Morning light on the peaks is spectacular.',
    images: [
      'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e3/Chimbulak_ski_resort.jpg/1280px-Chimbulak_ski_resort.jpg',
      'https://upload.wikimedia.org/wikipedia/commons/thumb/2/2c/Shymbulak_mountain_resort.jpg/1280px-Shymbulak_mountain_resort.jpg',
    ],
  },
  {
    name: 'Central State Museum',
    category: 'Culture',
    color: '#F97316',
    icon: '🏛️',
    lat: 43.2462, lng: 76.9268,
    desc: 'Kazakhstan\'s largest museum tracing the nation\'s story from ancient nomadic culture to modern statehood. The "Golden Man" — a Saka warrior\'s ceremonial armour of 4,000 gold pieces — is the crown jewel.',
    facts: [
      { label: 'Halls', value: '5 permanent' },
      { label: 'Exhibits', value: '170,000+ items' },
      { label: 'Highlight', value: 'The Golden Man' },
      { label: 'Hours', value: 'Tue–Sun 10–18' },
    ],
    tip: '<strong>Pro tip:</strong> The archaeology hall on the ground floor is unmissable. Audio guides available in English.',
    images: [
      'https://upload.wikimedia.org/wikipedia/commons/thumb/0/06/Central_State_Museum_of_Kazakhstan.jpg/1280px-Central_State_Museum_of_Kazakhstan.jpg',
      'https://upload.wikimedia.org/wikipedia/commons/thumb/7/71/Golden_Man_Kazakhstan.jpg/1280px-Golden_Man_Kazakhstan.jpg',
    ],
  },
];


// MAP
const map = L.map('map', {
  center: [43.215, 76.965],
  zoom: 12,
  zoomControl: true,
}).setView([43.215, 76.965], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

// MARKERS
PLACES.forEach(place => {
  const wrapper = document.createElement('div');
  wrapper.className = 'pin-wrap';
  wrapper.innerHTML = `
    <div class="pin-bubble" style="background:${place.color}">
      <span class="icon">${place.icon}</span>
    </div>
    <div class="pin-label">${place.name}</div>
  `;

  const icon = L.divIcon({
    className: '',
    html: wrapper.outerHTML,
    iconAnchor: [20, 50],
    popupAnchor: [0, -52],
  });

  L.marker([place.lat, place.lng], { icon })
    .addTo(map)
    .on('click', () => openPanel(place));
});

// PANEL
let galleryInterval = null;

function openPanel(place) {
  document.getElementById('panelCategory').textContent = place.category;
  document.getElementById('panelTitle').textContent = place.name;
  document.getElementById('panelDesc').textContent = place.desc;
  document.getElementById('panelFacts').innerHTML = place.facts.map(f =>
    `<div class="fact-card"><div class="label">${f.label}</div><div class="value">${f.value}</div></div>`
  ).join('');
  document.getElementById('panelTip').innerHTML = place.tip;

  // gallery
  const gallery = document.getElementById('panelGallery');
  gallery.innerHTML = '';
  if (galleryInterval) clearInterval(galleryInterval);

  const imgEls = place.images.map((src, i) => {
    const img = document.createElement('img');
    img.src = src;
    img.alt = place.name;
    if (i === 0) img.classList.add('active');
    img.onerror = () => {
      img.src = `https://placehold.co/420x260/1a1f2e/FFF8EE?text=${encodeURIComponent(place.name)}`;
    };
    gallery.appendChild(img);
    return img;
  });

  const dotsWrap = document.createElement('div');
  dotsWrap.className = 'gallery-dots';
  let cur = 0;

  const dotBtns = place.images.map((_, i) => {
    const b = document.createElement('button');
    if (i === 0) b.classList.add('active');
    b.addEventListener('click', () => goTo(i));
    dotsWrap.appendChild(b);
    return b;
  });
  gallery.appendChild(dotsWrap);

  function goTo(idx) {
    imgEls[cur].classList.remove('active');
    dotBtns[cur].classList.remove('active');
    cur = idx;
    imgEls[cur].classList.add('active');
    dotBtns[cur].classList.add('active');
  }

  if (place.images.length > 1) {
    galleryInterval = setInterval(() => goTo((cur + 1) % place.images.length), 3500);
  }

  document.getElementById('panel').classList.add('open');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  if (galleryInterval) clearInterval(galleryInterval);
}

map.on('click', () => {
  if (document.getElementById('panel').classList.contains('open')) closePanel();
});

// TICKER
const items = PLACES.map(p => `${p.icon} ${p.name.toUpperCase()}`).join('  ·  ');
const full = items + '  ·  ' + items;
document.getElementById('tickerInner').textContent = full;
</script>
</body>
</html>
