<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Almaty — Explore the City</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --red:    #E8382F;
      --orange: #F97316;
      --yellow: #FCD34D;
      --teal:   #0D9488;
      --sky:    #38BDF8;
      --ink:    #0F1117;
      --cream:  #FFF8EE;
      --muted:  #6B7280;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--ink);
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    header {
      position: relative;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      padding: .75rem 1.5rem;
      background: var(--ink);
      border-bottom: 2px solid var(--red);
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: .05em;
      color: var(--cream);
      line-height: 1;
    }
    .logo span { color: var(--red); }
    .tagline {
      font-size: .75rem;
      font-weight: 300;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .dot-legend {
      margin-left: auto;
      display: flex;
      gap: .9rem;
      align-items: center;
    }
    .dot-legend span {
      display: flex;
      align-items: center;
      gap: .35rem;
      font-size: .7rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .dot-legend i {
      width: 10px; height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    /* MAP */
    #map {
      flex: 1;
      width: 100%;
      background: #1a1f2e;
    }

    .leaflet-tile-pane { filter: saturate(.35) brightness(.55) hue-rotate(200deg); }
    .leaflet-control-attribution { display: none; }
    .leaflet-control-zoom a {
      background: var(--ink) !important;
      color: var(--cream) !important;
      border-color: #333 !important;
    }

    /* MARKER */
    .pin-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: transform .2s;
      will-change: transform;
    }
    .pin-wrap:hover { transform: scale(1.15) translateY(-3px); }
    .pin-bubble {
      width: 40px; height: 40px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      box-shadow: 0 4px 18px rgba(0,0,0,.6);
      border: 2px solid rgba(255,255,255,.18);
    }
    .pin-bubble .icon { transform: rotate(45deg); line-height: 1; }
    .pin-label {
      margin-top: 4px;
      background: var(--ink);
      color: var(--cream);
      font-size: .6rem;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 20px;
      white-space: nowrap;
      border: 1px solid rgba(255,255,255,.12);
    }

    /* PANEL */
    #panel {
      position: fixed;
      top: 0; right: 0;
      width: min(420px, 100vw);
      height: 100dvh;
      background: var(--ink);
      border-left: 2px solid var(--red);
      z-index: 9999;
      transform: translateX(110%);
      transition: transform .4s cubic-bezier(.22,1,.36,1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #panel.open { transform: translateX(0); }

    .panel-close {
      position: absolute;
      top: 1rem; right: 1rem;
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.15);
      color: var(--cream);
      font-size: 1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
      z-index: 10;
    }
    .panel-close:hover { background: var(--red); }

    .panel-gallery {
      width: 100%;
      height: 260px;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .panel-gallery img {
      width: 100%; height: 100%;
      object-fit: cover;
      position: absolute;
      top: 0; left: 0;
      opacity: 0;
      transition: opacity .5s;
    }
    .panel-gallery img.active { opacity: 1; }
    .gallery-dots {
      position: absolute;
      bottom: 10px;
      left: 50%; transform: translateX(-50%);
      display: flex; gap: 6px;
    }
    .gallery-dots button {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,.35);
      border: none; cursor: pointer;
      padding: 0;
      transition: background .2s, transform .2s;
    }
    .gallery-dots button.active {
      background: var(--yellow);
      transform: scale(1.3);
    }

    .panel-accent {
      height: 4px;
      width: 100%;
      background: linear-gradient(90deg, var(--red), var(--orange), var(--yellow));
      flex-shrink: 0;
    }

    .panel-body {
      padding: 1.5rem;
      overflow-y: auto;
      flex: 1;
    }
    .panel-category {
      font-size: .65rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--orange);
      font-weight: 500;
      margin-bottom: .4rem;
    }
    .panel-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      line-height: 1;
      letter-spacing: .04em;
      color: var(--cream);
      margin-bottom: .8rem;
    }
    .panel-desc {
      font-size: .9rem;
      line-height: 1.7;
      color: #b0b8c8;
      margin-bottom: 1.2rem;
    }
    .panel-facts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .6rem;
      margin-bottom: 1.4rem;
    }
    .fact-card {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 8px;
      padding: .65rem .85rem;
    }
    .fact-card .label {
      font-size: .6rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2px;
    }
    .fact-card .value {
      font-size: .88rem;
      font-weight: 500;
      color: var(--cream);
    }
    .panel-tip {
      background: linear-gradient(135deg, rgba(232,56,47,.12), rgba(249,115,22,.08));
      border-left: 3px solid var(--red);
      border-radius: 0 8px 8px 0;
      padding: .75rem 1rem;
      font-size: .82rem;
      color: #c8d0dc;
      line-height: 1.6;
    }
    .panel-tip strong { color: var(--yellow); }

    /* TICKER */
    #ticker {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 34px;
      background: var(--red);
      display: flex;
      align-items: center;
      overflow: hidden;
      z-index: 900;
    }
    .ticker-inner {
      display: flex;
      white-space: nowrap;
      animation: ticker 30s linear infinite;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: .12em;
      color: rgba(255,255,255,.9);
      gap: 3rem;
    }
    @keyframes ticker {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    .panel-body::-webkit-scrollbar { width: 4px; }
    .panel-body::-webkit-scrollbar-track { background: transparent; }
    .panel-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 2px; }

    @media (max-width: 600px) {
      #panel { width: 100vw; }
      .dot-legend { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">ALMA<span>TY</span></div>
    <div class="tagline">City of Apple Trees · Explorer's Map</div>
  </div>
  <div class="dot-legend">
    <span><i style="background:#E8382F"></i> Nature</span>
    <span><i style="background:#F97316"></i> Culture</span>
    <span><i style="background:#38BDF8"></i> Market</span>
    <span><i style="background:#0D9488"></i> Park</span>
    <span><i style="background:#FCD34D"></i> View</span>
  </div>
</header>

<div id="map"></div>

<div id="panel">
  <button class="panel-close" onclick="closePanel()">✕</button>
  <div class="panel-gallery" id="panelGallery"></div>
  <div class="panel-accent"></div>
  <div class="panel-body">
    <div class="panel-category" id="panelCategory"></div>
    <div class="panel-title" id="panelTitle"></div>
    <div class="panel-desc" id="panelDesc"></div>
    <div class="panel-facts" id="panelFacts"></div>
    <div class="panel-tip" id="panelTip"></div>
  </div>
</div>

<div id="ticker">
  <div class="ticker-inner" id="tickerInner"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const PLACES = [
  {
    name: 'Almaty Lake',
    category: 'Nature',
    color: '#E8382F',
    icon: '🏔️',
    lat: 43.1558, lng: 77.0283,
    desc: 'Almaty Lake is a beautiful mountain lake high in the Tian Shan mountains. The water is bright blue and very clear. It is surrounded by tall trees and snowy peaks. Many people go there to walk, take photos, and enjoy fresh mountain air.',
    facts: [
      { label: 'Altitude', value: '2,510 m' },
      { label: 'Best Season', value: 'June – Sep' },
      { label: 'Distance', value: '28 km from center' },
      { label: 'Temp (summer)', value: '~10–18 °C' },
    ],
    tip: '<strong>Tip:</strong> Go in the morning to avoid crowds. Bring a warm jacket — it gets cold near the water even in summer.',
    images: [
      'almaty-lake-photo1.jpg',
      'almaty-lake-photo2.jpg',
    ],
  },
  {
    name: 'Medeu',
    category: 'Nature',
    color: '#E8382F',
    icon: '⛸️',
    lat: 43.1436, lng: 77.0621,
    desc: 'Medeu is the highest ice skating rink in the world. It is 1,691 metres above sea level. Many world records in speed skating were set here. In summer you can walk around and enjoy the beautiful views of the mountains.',
    facts: [
      { label: 'Altitude', value: '1,691 m' },
      { label: 'Rink Area', value: '10,500 m²' },
      { label: 'Open', value: 'Year-round' },
      { label: 'Distance', value: '15 km from center' },
    ],
    tip: '<strong>Tip:</strong> Walk up the 842 steps of the dam for a great view of the gorge. It is free and the view is amazing.',
    images: [
      'medeu-photo1.jpg',
      'medeu-photo2.jpg',
    ],
  },
  {
    name: 'Kok-Tobe Hill',
    category: 'View',
    color: '#FCD34D',
    icon: '🗼',
    lat: 43.2458, lng: 76.9853,
    desc: 'Kok-Tobe is a hill with a great view of the whole city. You can get there by cable car, which takes about 4 minutes. At the top there is a park, cafes, rides, and a famous statue of The Beatles. It is very beautiful at night.',
    facts: [
      { label: 'Altitude', value: '1,100 m' },
      { label: 'Cable Car', value: 'Yes — 4 min' },
      { label: 'Open', value: 'Daily, 10:00–23:00' },
      { label: 'Highlight', value: 'Beatles Statue' },
    ],
    tip: '<strong>Tip:</strong> Go in the evening — you can see the city lights below and the mountains in the background. Very romantic!',
    images: [
      'koktobe-photo1.jpg',
      'koktobe-photo2.jpg',
    ],
  },
  {
    name: 'Green Bazaar',
    category: 'Market',
    color: '#38BDF8',
    icon: '🧆',
    lat: 43.2615, lng: 76.9508,
    desc: 'The Green Bazaar is a big and lively market in the centre of Almaty. You can find fruits, nuts, spices, meat, and traditional food. The sellers are very friendly and will often give you free samples to try. It is a great place to feel local life.',
    facts: [
      { label: 'Hours', value: '9:00 – 19:00' },
      { label: 'Founded', value: '1875' },
      { label: 'Location', value: 'Zhibek Zholy Ave' },
      { label: 'Must-try', value: 'Dried fruits & kurt' },
    ],
    tip: '<strong>Tip:</strong> You can ask for a lower price — it is normal here. Try the fresh pomegranate juice near the entrance.',
    images: [
      'green-bazaar-photo1.jpg',
      'green-bazaar-photo2.jpg',
    ],
  },
  {
    name: 'Presidential Park',
    category: 'Park',
    color: '#0D9488',
    icon: '🌳',
    lat: 43.2415, lng: 76.9492,
    desc: 'Presidential Park is a large and quiet park in Almaty. It has wide paths, fountains, green trees, and a big monument. People come here to walk, run, or just relax. From the south part of the park you can see the mountains very well.',
    facts: [
      { label: 'Area', value: '~70 hectares' },
      { label: 'Entry', value: 'Free, open 24 hrs' },
      { label: 'Feature', value: 'Independence Monument' },
      { label: 'Metro', value: 'Baikonur Station' },
    ],
    tip: '<strong>Tip:</strong> Walk to the south end of the park for the best mountain view. Nice at any time of day.',
    images: [
      'president-park-photo1.jpg',
      'president-park-photo2.jpg',
    ],
  },
  {
    name: 'Shymbulak Resort',
    category: 'Nature',
    color: '#E8382F',
    icon: '⛷️',
    lat: 43.1304, lng: 77.0799,
    desc: 'Shymbulak is the biggest ski resort in Kazakhstan. In winter you can ski and snowboard on snowy slopes. In summer it is great for hiking and enjoying fresh mountain air. You can get there by gondola from Medeu — the ride is very scenic.',
    facts: [
      { label: 'Base Altitude', value: '2,200 m' },
      { label: 'Top Altitude', value: '3,200 m' },
      { label: 'Ski Season', value: 'Nov – April' },
      { label: 'Gondola', value: 'From Medeu' },
    ],
    tip: '<strong>Tip:</strong> Buy a combined ticket for Medeu and Shymbulak gondola — it saves money and you can visit both in one day.',
    images: [
      'shymbulak-photo1.jpg',
      'shymbulak-photo2.jpg',
    ],
  },
  {
    name: 'Central State Museum',
    category: 'Culture',
    color: '#F97316',
    icon: '🏛️',
    lat: 43.2462, lng: 76.9268,
    desc: 'The Central State Museum is the biggest museum in Kazakhstan. It shows the history of the country from ancient times to today. The most famous exhibit is the Golden Man — a warrior\'s suit made of 4,000 pieces of gold. It is very impressive.',
    facts: [
      { label: 'Halls', value: '5 permanent' },
      { label: 'Exhibits', value: '170,000+ items' },
      { label: 'Highlight', value: 'The Golden Man' },
      { label: 'Hours', value: 'Tue–Sun 10–18' },
    ],
    tip: '<strong>Tip:</strong> Start with the ground floor — the ancient history section is the best part. English audio guides are available.',
    images: [
      'museum-photo1.jpg',
      'museum-photo2.jpg',
    ],
  },
];


// MAP
const map = L.map('map', {
  center: [43.215, 76.965],
  zoom: 12,
  zoomControl: true,
}).setView([43.215, 76.965], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

// MARKERS
PLACES.forEach(place => {
  const wrapper = document.createElement('div');
  wrapper.className = 'pin-wrap';
  wrapper.innerHTML = `
    <div class="pin-bubble" style="background:${place.color}">
      <span class="icon">${place.icon}</span>
    </div>
    <div class="pin-label">${place.name}</div>
  `;

  const icon = L.divIcon({
    className: '',
    html: wrapper.outerHTML,
    iconAnchor: [20, 50],
    popupAnchor: [0, -52],
  });

  L.marker([place.lat, place.lng], { icon })
    .addTo(map)
    .on('click', () => openPanel(place));
});

// PANEL
let galleryInterval = null;

function openPanel(place) {
  document.getElementById('panelCategory').textContent = place.category;
  document.getElementById('panelTitle').textContent = place.name;
  document.getElementById('panelDesc').textContent = place.desc;
  document.getElementById('panelFacts').innerHTML = place.facts.map(f =>
    `<div class="fact-card"><div class="label">${f.label}</div><div class="value">${f.value}</div></div>`
  ).join('');
  document.getElementById('panelTip').innerHTML = place.tip;

  // gallery
  const gallery = document.getElementById('panelGallery');
  gallery.innerHTML = '';
  if (galleryInterval) clearInterval(galleryInterval);

  const imgEls = place.images.map((src, i) => {
    const img = document.createElement('img');
    img.src = src;
    img.alt = place.name;
    if (i === 0) img.classList.add('active');
    img.onerror = () => {
      img.src = `https://placehold.co/420x260/1a1f2e/FFF8EE?text=${encodeURIComponent(place.name)}`;
    };
    gallery.appendChild(img);
    return img;
  });

  const dotsWrap = document.createElement('div');
  dotsWrap.className = 'gallery-dots';
  let cur = 0;

  const dotBtns = place.images.map((_, i) => {
    const b = document.createElement('button');
    if (i === 0) b.classList.add('active');
    b.addEventListener('click', () => goTo(i));
    dotsWrap.appendChild(b);
    return b;
  });
  gallery.appendChild(dotsWrap);

  function goTo(idx) {
    imgEls[cur].classList.remove('active');
    dotBtns[cur].classList.remove('active');
    cur = idx;
    imgEls[cur].classList.add('active');
    dotBtns[cur].classList.add('active');
  }

  if (place.images.length > 1) {
    galleryInterval = setInterval(() => goTo((cur + 1) % place.images.length), 3500);
  }

  document.getElementById('panel').classList.add('open');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  if (galleryInterval) clearInterval(galleryInterval);
}

map.on('click', () => {
  if (document.getElementById('panel').classList.contains('open')) closePanel();
});

// TICKER
const items = PLACES.map(p => `${p.icon} ${p.name.toUpperCase()}`).join('  ·  ');
const full = items + '  ·  ' + items;
document.getElementById('tickerInner').textContent = full;
</script>
</body>
</html>
